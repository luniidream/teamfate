services:
  - type: web
    name: team-fate-tracker
    env: node
    region: oregon
    plan: free
    buildCommand: corepack enable && pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
