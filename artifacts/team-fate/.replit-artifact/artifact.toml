kind = "web"
previewPath = "/"
title = "Team Fate"
version = "1.0.0"
id = "artifacts/team-fate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23596

[services.development]
run = "pnpm --filter @workspace/team-fate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/team-fate", "run", "build" ]
publicDir = "artifacts/team-fate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23596"
BASE_PATH = "/"
